<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VectorVision Hub | Architect Ali</title>
    <style>
        :root { --blue: #00f2ff; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--blue); width: 100%; max-width: 500px; padding-bottom: 10px; }
        h1 { font-size: 1.2rem; letter-spacing: 3px; color: var(--blue); margin: 0; }

        .terminal { background: #000; border: 1px solid #333; height: 140px; width: 100%; max-width: 460px; overflow-y: auto; padding: 10px; font-size: 0.7rem; color: #0f0; margin: 15px 0; }
        
        .upload-zone { border: 1px dashed #444; padding: 40px; text-align: center; cursor: pointer; width: 100%; max-width: 440px; background: rgba(255,255,255,0.01); }
        #fileInput { display: none; }

        #progress-container { width: 100%; max-width: 460px; height: 4px; background: #222; margin: 10px 0; display: none; }
        #progress-bar { height: 100%; width: 0%; background: var(--blue); box-shadow: 0 0 10px var(--blue); transition: width 0.3s; }

        #result { display: none; margin-top: 20px; width: 100%; max-width: 460px; text-align: center; }
        .svg-box { background: #fff; padding: 10px; border-radius: 4px; min-height: 200px; display: flex; align-items: center; justify-content: center; overflow: auto; }
        svg { max-width: 100%; height: auto; }

        .btn { background: transparent; border: 1px solid var(--blue); color: var(--blue); padding: 12px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn:hover { background: var(--blue); color: #000; }
    </style>
</head>
<body>

    <div class="header">
        <h1>VECTORVISION HUB v2.0</h1>
        <p style="font-size: 0.6rem; opacity: 0.6;">CLOUD-POWERED ARCHITECTURE // ALI LABS</p>
    </div>

    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        LOAD IMAGE DATA<br><small>[ BYPASSING MOBILE CPU LIMITS ]</small>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div id="progress-container"><div id="progress-bar"></div></div>
    <div class="terminal" id="logs">> WAITING FOR DATA INGESTION...</div>

    <div id="result">
        <div class="svg-box" id="svg-out"></div>
        <button class="btn" onclick="downloadSVG()">EXPORT VECTOR LOGIC (.SVG)</button>
    </div>

    <script>
        const log = (m) => { 
            const e = document.createElement('div'); 
            e.innerText = `> ${new Date().toLocaleTimeString()}: ${m}`; 
            logs.appendChild(e); logs.scrollTop = logs.scrollHeight; 
        };

        document.getElementById('fileInput').onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // UI Reset
            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('progress-bar').style.width = '10%';
            document.getElementById('result').style.display = 'none';
            log(`File detected: ${file.name}`);
            log("Connecting to Vercel Cloud Node...");

            const reader = new FileReader();
            reader.onload = async (event) => {
                log("Uploading pixels to serverless function...");
                document.getElementById('progress-bar').style.width = '40%';

                const response = await fetch('/api/vectorize', {
                    method: 'POST',
                    body: JSON.stringify({ image: event.target.result })
                });

                if (response.ok) {
                    const data = await response.json();
                    log("SUCCESS: Mathematical paths received.");
                    document.getElementById('progress-bar').style.width = '100%';
                    document.getElementById('svg-out').innerHTML = data.svg;
                    document.getElementById('result').style.display = 'block';
                } else {
                    log("ERROR: Cloud Node Timeout. Check image size.");
                }
            };
            reader.readAsDataURL(file);
        };

        function downloadSVG() {
            const svgData = document.querySelector('svg').outerHTML;
            const blob = new Blob([svgData], {type: 'image/svg+xml'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'VectorVision_Cloud.svg';
            a.click();
        }
    </script>
</body>
</html>
