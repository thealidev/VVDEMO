<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VectorVision v2.2 | Architect Ali</title>
    <style>
        :root { --blue: #00f2ff; --bg: #020202; }
        body { background: var(--bg); color: #fff; font-family: monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .terminal { background: #000; border: 1px solid #333; height: 180px; width: 100%; max-width: 460px; overflow-y: auto; padding: 10px; font-size: 0.7rem; color: #0f0; margin: 15px 0; }
        .upload-zone { border: 1px dashed #444; padding: 40px; text-align: center; cursor: pointer; width: 100%; max-width: 440px; }
        #progress-bar { height: 4px; width: 0%; background: var(--blue); transition: 0.3s; margin: 10px 0; display:none; }
        #svg-out { background: #fff; margin-top: 20px; display: none; padding: 10px; width: 100%; max-width: 440px; }
        .btn { background: none; border: 1px solid var(--blue); color: var(--blue); padding: 12px; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h2 style="color:var(--blue)">VECTORVISION v2.2 [HEAVY ENGINE]</h2>
    <div class="upload-zone" onclick="document.getElementById('in').click()">INGEST DATA<br><small>[ STABILITY ASSURED ]</small></div>
    <input type="file" id="in" style="display:none" accept="image/*">
    <div id="progress-bar"></div>
    <div class="terminal" id="logs">> STANDBY...</div>
    <div id="svg-out">
        <div id="preview"></div>
        <button class="btn" onclick="dl()">EXPORT LOGIC</button>
    </div>

    <script>
        const log = (m) => { logs.innerHTML += `<div>> ${m}</div>`; logs.scrollTop = logs.scrollHeight; };
        
        document.getElementById('in').onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            log(`File: ${file.name}`);
            document.getElementById('progress-bar').style.display = 'block';
            
            const r = new FileReader();
            r.onload = async (ev) => {
                log("Executing Cloud Job...");
                const res = await fetch('/api/vectorize', {
                    method: 'POST',
                    body: JSON.stringify({ image: ev.target.result })
                });
                const { jobId } = await res.json();
                
                // Keep checking the Cloud until it's finished
                const check = setInterval(async () => {
                    log("Cloud Node Calculating...");
                    const statusRes = await fetch(`https://api.cloudconvert.com/v2/jobs/${jobId}`, {
                        headers: { 'Authorization': `Bearer YOUR_PUBLIC_KEY_HERE` }
                    });
                    const status = await statusRes.json();
                    if (status.data.status === 'finished') {
                        clearInterval(check);
                        log("SUCCESS: Vector Logic Captured.");
                        const svgUrl = status.data.tasks.find(t => t.name === 'export-1').result.files[0].url;
                        const svgText = await fetch(svgUrl).then(r => r.text());
                        document.getElementById('preview').innerHTML = svgText;
                        document.getElementById('svg-out').style.display = 'block';
                    }
                }, 3000);
            };
            r.readAsDataURL(file);
        };
    </script>
</body>
</html>
