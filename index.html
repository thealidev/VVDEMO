<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VectorVision v1.5 | Public Cloud Node</title>
    <style>
        :root { --blue: #00f2ff; --bg: #020202; --card: #0a0a0c; }
        body { background: var(--bg); color: #fff; font-family: monospace; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .terminal { background: #000; border: 1px solid #222; width: 100%; max-width: 500px; padding: 10px; font-size: 0.7rem; color: #0f0; height: 150px; overflow-y: auto; margin-top: 10px; }
        .upload-box { border: 1px dashed #333; padding: 40px; text-align: center; width: 100%; max-width: 420px; cursor: pointer; }
        .progress-bar { width: 100%; height: 4px; background: #111; margin: 10px 0; display: none; }
        #fill { width: 0%; height: 100%; background: var(--blue); transition: 0.4s; }
        #svg-res { background: #fff; margin-top: 20px; display: none; padding: 10px; width: 100%; max-width: 400px; }
        .btn { background: none; border: 1px solid var(--blue); color: var(--blue); padding: 10px; width: 100%; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2 style="color:var(--blue); letter-spacing: 2px;">VECTORVISION v1.5</h2>
    <p style="font-size: 0.6rem; opacity: 0.5;">DECENTRALIZED ARCHITECTURE // ALI LABS</p>

    <div class="upload-box" onclick="document.getElementById('in').click()">
        INGEST PIXELS<br><small>[ BYPASSING ADOBE FAILURES ]</small>
    </div>
    <input type="file" id="in" style="display:none" accept="image/*">

    <div class="progress-bar" id="pb"><div id="fill"></div></div>
    <div class="terminal" id="term">> SYSTEM READY. WAITING FOR DATA...</div>

    <div id="svg-res">
        <div id="out"></div>
        <button class="btn" onclick="dl()">EXPORT VECTOR LOGIC</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/potrace@1.0.1/potrace.min.js"></script>
    <script>
        const log = (m) => { const e = document.createElement('div'); e.innerText = `> ${m}`; term.appendChild(e); term.scrollTop = term.scrollHeight; };
        
        document.getElementById('in').onchange = function(e) {
            const file = e.target.files[0];
            pb.style.display = 'block';
            fill.style.width = '20%';
            log(`File: ${file.name} detected.`);
            log("Adobe detected. Bypassing inefficient cloud nodes...");

            const r = new FileReader();
            r.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    log("Recalculating Geometry...");
                    fill.style.width = '50%';
                    
                    const canv = document.createElement('canvas');
                    const ctx = canv.getContext('2d');
                    // CRITICAL: We limit to 400px for the LIVE demo to ensure it NEVER stalls.
                    canv.width = 400; canv.height = (img.height / img.width) * 400;
                    ctx.drawImage(img, 0, 0, 400, canv.height);
                    
                    Potrace.loadImage(canv.toDataURL());
                    Potrace.process(() => {
                        log("SUCCESS: Infinite scaling logic captured.");
                        fill.style.width = '100%';
                        document.getElementById('out').innerHTML = Potrace.getSVG(1);
                        document.getElementById('svg-res').style.display = 'block';
                    });
                };
                img.src = ev.target.result;
            };
            r.readAsDataURL(file);
        };
        function dl() {
            const blob = new Blob([document.querySelector('svg').outerHTML], {type: 'image/svg+xml'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'VectorVision.svg'; a.click();
        }
    </script>
</body>
</html>
